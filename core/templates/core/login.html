{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white shadow-lg rounded-lg p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Iniciar Sesión</h2>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            {% if form.errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <p>Tu usuario o contraseña no son correctos. Intenta de nuevo.</p>
            </div>
            {% endif %}

            <div class="mb-4">
                <label for="id_username" class="block text-gray-700 text-sm font-bold mb-2">Usuario</label>
                <input type="text" name="username" id="id_username" 
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                       required autofocus>
            </div>

            <div class="mb-6">
                <label for="id_password" class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
                <input type="password" name="password" id="id_password" 
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                       required>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline w-full transition-colors text-lg shadow-lg">
                    Iniciar Sesión
                </button>
            </div>
            
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
        </form>
    </div>
</div>
{% endblock %}
