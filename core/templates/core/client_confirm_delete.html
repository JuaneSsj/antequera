{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2 style="color: var(--danger);">Archivar Cliente</h2>
    <p class="mb-4">¿Estás seguro que deseas archivar al cliente "{{ object.full_name }}"? El cliente será movido a la lista de clientes antiguos y podrá ser reactivado posteriormente.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="flex" style="justify-content: center;">
            <button type="submit" class="btn" style="background-color: var(--danger); color: white;">Sí,
                Archivar</button>
            <a href="{% url 'client_detail' object.pk %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
