{% extends 'core/base.html' %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2>Registrar Medición {% if client %}para {{ client.full_name }}{% endif %}</h2>

    <form method="post">
        {% csrf_token %}

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            {% for field in form %}
            <div class="form-group" {% if field.name
                in 'anthropometry_observations,evaluations_done,additional_comments' %}style="grid-column: 1 / -1;" {%
                endif %}>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small style="color: var(--text-secondary);">{{ field.help_text }}</small>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <div class="flex" style="margin-top: 2rem;">
            <button type="submit" class="btn">Guardar Medición</button>
            <button type="button" class="btn btn-secondary" onclick="history.back()">Cancelar</button>
        </div>
    </form>
</div>
{% endblock %}
